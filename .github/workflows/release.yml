# Cross-platform Tauri build matrix. Runs on every push to a tag matching
# `v*` (e.g. `v0.2.0`), producing a draft GitHub Release with:
#   - Squint_<version>_aarch64.dmg + Squint_<version>_x64.dmg  (macOS)
#   - Squint_<version>_x64-setup.exe + Squint_<version>_x64_en-US.msi  (Windows)
#   - squint_<version>_amd64.deb + Squint_<version>_amd64.AppImage   (Linux)
#
# Why not cross-compile from macOS? Tauri's Windows build needs WebView2 +
# the MSVC toolchain (Windows-only) or a flaky mingw-w64 + xwin setup. The
# matrix below is the standard / official approach: each OS builds its own
# native target on a GitHub-hosted runner.
#
# Trigger this with:
#   git tag v0.2.0 && git push origin v0.2.0
# Or fire it manually from the Actions tab (workflow_dispatch).

name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS: two architectures — Apple Silicon (aarch64) ships on
          # macos-14 (M1) and Intel (x86_64) on macos-13. The bundler
          # produces `.dmg` + `.app.tar.gz` for each.
          - platform: macos-14
            args: --target aarch64-apple-darwin
          - platform: macos-13
            args: --target x86_64-apple-darwin
          # Windows: a single x64 build. Tauri's bundler emits both an
          # NSIS installer (.exe) and an MSI by default. WebView2 is
          # downloaded at first launch on machines that don't have it.
          - platform: windows-latest
            args: ""
          # Linux: an AppImage + a .deb. Native x86_64 only — ARM Linux
          # is a separate matrix entry if/when we ever ship for it.
          - platform: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # ----- toolchains -----
      - name: Install Rust + target
        uses: dtolnay/rust-toolchain@stable
        with:
          # Adds the architecture-specific target for the matrix entries
          # that need it (macOS cross-arch). Windows/Linux use the host
          # default.
          targets: ${{ matrix.platform == 'macos-14' && 'aarch64-apple-darwin' || matrix.platform == 'macos-13' && 'x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ----- Linux-only system deps -----
      # GTK / webkit2gtk / libsoup pull in a tree of headers; the Tauri
      # Action docs list these as the canonical set for Ubuntu 22.04.
      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      # ----- frontend build -----
      - name: Install JS deps
        run: npm ci

      # ----- Tauri bundle -----
      # `tauri-apps/tauri-action` runs `cargo tauri build` and uploads
      # every produced artifact to a draft GitHub Release matching the
      # tag. `releaseDraft: true` lets you review before publishing.
      - name: Build + release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Apple notarization + signing — uncomment + add the matching
          # repository secrets if you want signed/notarized macOS builds.
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Squint ${{ github.ref_name }}"
          releaseBody: |
            Auto-built from the `${{ github.ref_name }}` tag.
            macOS, Windows, and Linux artefacts attached below.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
