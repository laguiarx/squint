# macOS-only Tauri release workflow. Runs on every push to a tag matching
# `v*` (e.g. `v0.2.4`), producing a draft GitHub Release with Apple Silicon
# and Intel macOS artifacts.
#
# Trigger this with:
#   git tag v0.2.4 && git push origin v0.2.4
# Or fire it manually from the Actions tab with a `v*` tag name.

name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.2.4"
        required: true
        type: string

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS: two architectures — Apple Silicon (aarch64) ships on
          # macos-14 and Intel (x86_64) uses GitHub's current Intel label.
          # The bundler produces `.dmg` + `.app.tar.gz` for each.
          - platform: macos-14
            args: --target aarch64-apple-darwin
          - platform: macos-15-intel
            args: --target x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # ----- toolchains -----
      - name: Install Rust + target
        uses: dtolnay/rust-toolchain@stable
        with:
          # Adds the architecture-specific target for each macOS build.
          targets: ${{ matrix.platform == 'macos-14' && 'aarch64-apple-darwin' || matrix.platform == 'macos-15-intel' && 'x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - uses: oven-sh/setup-bun@v2

      # ----- frontend build -----
      - name: Install JS deps
        run: bun install --frozen-lockfile

      # ----- Tauri bundle -----
      # `tauri-apps/tauri-action` runs `cargo tauri build` and uploads
      # every produced artifact to a draft GitHub Release matching the
      # tag. `releaseDraft: true` lets you review before publishing.
      - name: Build + release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple notarization + signing — uncomment + add the matching
          # repository secrets if you want signed/notarized macOS builds.
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseName: "Dispatch ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          releaseBody: |
            Auto-built from the `${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}` tag.
            macOS Apple Silicon and Intel artifacts attached below.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          tauriScript: bun tauri
          args: ${{ matrix.args }}
