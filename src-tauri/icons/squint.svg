<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Squint app icon">
  <!--
    macOS app icon. Canvas 1024², rounded square inset to 920 × 920
    (52 px margin per side, ~90 % canvas fill). Earlier revisions at
    83 % (87 px margin) read as visibly smaller than common Dock
    neighbours (Slack, Borealis, Linear); this geometry brings the
    squircle up to their size.

    Corner radius 207 derived from Apple Big Sur ratio (185.4 / 824)
    scaled to the 920 squircle (920 × 0.2249 = 206.9).

    Mark coordinates: original 1024-canvas drawing scaled 0.8984× and
    offset by 52:
      x' = round(x_old · 0.8984) + 52
      y' = round(y_old · 0.8984) + 52
  -->
  <defs>
    <clipPath id="squint-icon-mask">
      <rect x="52" y="52" width="920" height="920" rx="207" ry="207" />
    </clipPath>
  </defs>

  <g clip-path="url(#squint-icon-mask)">
    <rect x="52" y="52" width="920" height="920" fill="#0B0B0F" />

    <!-- Geometric squint mark: two filled apertures separated by a
         negative-space slit. -->
    <g fill="#5B5BD6" shape-rendering="geometricPrecision">
      <path d="M261 395L512 490L763 395V494H261V395Z" />
      <path d="M261 638L512 543L763 638V537H261V638Z" />
    </g>
  </g>
</svg>
